<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sigue tu orden | HORNOFINO</title>
<link rel="icon" href="assets/favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
<style>
  .track-wrap{max-width:560px;margin:40px auto 90px;padding:0 20px}
  .track-card{
    position:relative;overflow:hidden;border-radius:28px;
    background:
      radial-gradient(560px 300px at 85% -10%, rgba(217,182,101,.24), transparent 60%),
      linear-gradient(160deg,var(--blanco),var(--paper-2));
    border:1px solid var(--gold-line);box-shadow:var(--sombra-lift);
    padding:38px 32px;
  }
  .track-card h1{font-size:1.9rem;margin:10px 0 4px}
  .track-card .sub{color:var(--ink-soft);font-size:.92rem;margin-bottom:28px}
  .steps{display:flex;flex-direction:column;gap:0;margin:10px 0 24px}
  .step{display:flex;gap:16px;align-items:flex-start;position:relative;padding-bottom:26px}
  .step::before{
    content:"";position:absolute;left:15px;top:32px;bottom:0;width:1.5px;background:var(--gold-line);
  }
  .step:last-child{padding-bottom:0}
  .step:last-child::before{display:none}
  .step .dot{
    width:32px;height:32px;border-radius:50%;flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;
    background:var(--paper);box-shadow:inset 0 0 0 1px var(--gold-line);
    color:rgba(163,127,53,.4);font-size:.8rem;font-weight:800;
  }
  .step.done .dot{background:var(--grad-btn);color:#1A130A;box-shadow:none}
  .step.now .dot{box-shadow:0 0 0 4px rgba(217,182,101,.3);background:var(--grad-btn);color:#1A130A}
  .step b{display:block;font-size:.94rem;color:var(--ink)}
  .step span{font-size:.8rem;color:var(--ink-faint)}
  .step.pending b{color:var(--ink-faint)}
  .items{border-top:1px solid var(--gold-line);padding-top:18px;font-size:.9rem;color:var(--ink-soft)}
  .items div{display:flex;justify-content:space-between;padding:3px 0}
  .items .tot{font-weight:750;color:var(--ink);border-top:1px solid var(--gold-line);margin-top:10px;padding-top:10px}
  .items .tot span:last-child{color:var(--or)}
  .missing{text-align:center;padding:60px 0}
  .topbar{display:flex;justify-content:space-between;align-items:center;max-width:560px;margin:18px auto 0;padding:0 20px}
  .topbar a{font-size:.72rem;font-weight:650;letter-spacing:.16em;text-transform:uppercase;color:var(--or)}
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html">← McQueenyGroup</a>
  <a href="tarjeta.html">Mi tarjeta</a>
</div>

<div class="track-wrap">
  <div class="track-card">
    <span class="eyebrow">Tu orden</span>
    <div id="content"><div class="missing"><p>Buscando tu orden…</p></div></div>
  </div>
</div>

<div class="grain" aria-hidden="true"></div>

<script>
const id = (new URLSearchParams(location.search).get('id') || '').toUpperCase();
const STEPS = [
  ['nueva', 'Recibida', 'La tienda ya tiene tu orden en pantalla'],
  ['preparando', 'En el horno', 'La están preparando ahora mismo'],
  ['lista', '¡Lista!', 'Pasa a recogerla al mostrador'],
  ['entregada', 'Entregada', 'Buen provecho — y gracias 🥖'],
];
const fmt = ts => ts ? new Date(ts).toLocaleTimeString('es-PR', {hour:'numeric', minute:'2-digit'}) : '';

async function load() {
  if (!/^HF-[A-Z2-9]{4}$/.test(id)) {
    document.getElementById('content').innerHTML =
      '<div class="missing"><h1>Orden no encontrada</h1><p style="color:var(--ink-soft)">Revisa el enlace de tu confirmación.</p></div>';
    return false;
  }
  try {
    const res = await fetch('/api/order-status?id=' + id);
    if (!res.ok) throw 0;
    const o = await res.json();
    if (o.status === 'cancelada') {
      document.getElementById('content').innerHTML =
        `<h1>Orden ${o.id}</h1><p class="sub">${o.store}</p>
         <p style="color:var(--ink-soft)">Esta orden fue cancelada por la tienda. Si tienes dudas, pregunta en el mostrador.</p>`;
      return false;
    }
    const idx = STEPS.findIndex(s => s[0] === o.status);
    document.getElementById('content').innerHTML = `
      <h1>Orden <em>${o.id}</em></h1>
      <p class="sub">Recoges en ${o.store}</p>
      <div class="steps">
        ${STEPS.map(([key, title, desc], i) => `
          <div class="step ${i < idx ? 'done' : i === idx ? 'now' : 'pending'}">
            <div class="dot">${i < idx ? '✓' : i + 1}</div>
            <div><b>${title}</b><span>${i <= idx ? (fmt(o.statusTs && o.statusTs[key]) || desc) : desc}</span></div>
          </div>`).join('')}
      </div>
      <div class="items">
        ${o.items.map(l => `<div><span>${l.qty}× ${l.name}</span></div>`).join('')}
        <div class="tot"><span>Total${o.estimate ? ' estimado' : ''}</span><span>$${o.total.toFixed(2)}${o.estimate ? '+' : ''}</span></div>
      </div>`;
    return o.status !== 'entregada';
  } catch (e) {
    document.getElementById('content').innerHTML =
      '<div class="missing"><h1>Orden no encontrada</h1><p style="color:var(--ink-soft)">Revisa el enlace de tu confirmación.</p></div>';
    return false;
  }
}

(async () => {
  let keep = await load();
  const timer = setInterval(async () => {
    keep = await load();
    if (!keep) clearInterval(timer);
  }, 10000);
})();
</script>
</body>
</html>
